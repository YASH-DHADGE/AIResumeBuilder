<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Resume Builder</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div id="app" class="popup-shell">
    <div id="login-view" class="view">
      <header class="topbar">
        <div class="brand-mark">✦</div>
        <div>
          <p class="eyebrow">Extension Login</p>
          <h1>AI Resume Builder</h1>
        </div>
      </header>

      <section class="content">
        <p class="intro-text">
          Sign in with your app account to analyze job listings and sync missing skills in one click.
        </p>

        <form id="login-form" class="auth-form">
          <label class="field-label" for="ext-email">Email</label>
          <input type="email" id="ext-email" placeholder="you@example.com" required />

          <label class="field-label" for="ext-password">Password</label>
          <input type="password" id="ext-password" placeholder="Your password" required />

          <button type="submit" id="ext-login-btn" class="primary-btn">Sign In</button>
          <p id="login-error" class="error"></p>
        </form>
      </section>
    </div>

    <div id="dashboard-view" class="view hidden">
      <header class="topbar">
        <div class="brand-mark">✦</div>
        <div class="topbar-copy">
          <p class="eyebrow">Live Job Analysis</p>
          <h1>ATS Dashboard</h1>
        </div>
        <button id="ext-logout-btn" class="logout-btn" title="Sign out">↗</button>
      </header>

      <section class="content">
        <div id="analyze-action" class="card compact">
          <button id="ext-analyze-btn" class="primary-btn action-btn" type="button">
            <span class="icon">✦</span>
            Analyze job on this page
          </button>
        </div>

        <div id="score-section" class="card score-card">
          <div class="score-circle" id="score-circle">
            <svg viewBox="0 0 120 120" class="score-svg">
              <circle cx="60" cy="60" r="54" class="score-bg" />
              <circle cx="60" cy="60" r="54" class="score-ring" id="score-ring" />
            </svg>
            <div class="score-value" id="score-value">—</div>
          </div>
          <p class="score-label">ATS Score</p>
        </div>

        <div id="skills-section" class="card">
          <details id="user-skills-details" open>
            <summary class="section-title skills-title">
              ⚡ Your Profile Skills
              <span id="skills-count-badge" class="skills-badge">0</span>
            </summary>
            <div id="user-skills-chips" class="chips"></div>
          </details>
        </div>

        <div id="matched-section" class="card">
          <h3 class="section-title matched-title">✓ Matched Skills</h3>
          <div id="matched-chips" class="chips"></div>
        </div>

        <div id="missing-section" class="card">
          <h3 class="section-title missing-title">✗ Missing Skills</h3>
          <div id="missing-chips" class="chips"></div>
        </div>
      </section>

      <div id="status-bar" class="status-bar">
        <span id="status-text">Open a LinkedIn job page to analyze</span>
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
